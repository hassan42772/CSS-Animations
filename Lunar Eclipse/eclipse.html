<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lunar Eclipse</title>
</head>
<style>
    *{
        margin: 0;
        padding: 0;
        box-sizing: border-box;
    }
    body{
        width: 100%;
        height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        flex-direction: column;
        }
        h1{
            text-transform: uppercase ;
            margin-bottom: 20px;
        }
    .outer{
        width: 50%;
        height: 70vh;
        display: flex;
        justify-content: center;
        align-items: center;
        background-color: yellow;
        position: relative;
        overflow: hidden;  
        animation: changer2 10s ease-in-out infinite alternate ;

        

    }
    @keyframes changer2{
        0%{
            background-color: yellow;
                  
        }
        25%{
            background-color: yellow;

        }
        50%{
            background-color: black;

        }
        75%{
            background-color: yellow;

        }
        100%{
            background-color: yellow;

        }
       
    }

    .inner{
        content: "";
        position: absolute;
        width: 25%; 
        aspect-ratio: 1;
        border-radius: 50%;
        background-color: orange;
        box-shadow: 0 0 20px 1px orange;
        overflow: hidden;
        /* animation: changer 5s linear 1s infinite  alternate; */
        
    }
    .inner::after{
        content: "";
        position: absolute;
        width: 100%; 
        aspect-ratio: 1;
        border-radius: 50%;
        background-color: black;
        animation: changer 10s ease-in-out alternate infinite ;  
        
    }
    @keyframes changer{
        0%{
            transform: translateX(250px);
                  
        }
        
       
        50%{
            transform: translateX(0);
            scale: 0.9;


        }
        100%{
            transform: translateX(-250px);

        }
       
    }
    
</style>
<body>
    <h1>Luna Eclipse</h1>
    <div class="outer">
    <div class="inner"></div>
    </div>
</body>
</html>
