<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pendulum Animation</title>
</head>
<style>
    *{
        margin: 0;
        padding: 0;
        box-sizing: border-box;
    }
    body{
        display: flex;
        justify-content: center;
        align-items: center;
        flex-direction: column;
        margin-top: 2rem;
    
    }
    .heading{
        font-size: 2rem;
        font-weight: 600;
        color: brown;
        margin-bottom: 2rem;
    }

    .Newton-animation{
        width: 50rem;
        height: 30rem;
        border-top:2rem solid brown;
        display: flex;
        justify-content: center;
        text-align: center;
        gap: 32px;
        border-radius: 10px;

    }
    .Newton-animation div{
        display: flex;
        width: 1%;
        height: 35vh;
       
        background-color: black;
        position: relative;
    }
    .Newton-animation div::before{
        position: absolute;
        content: "";
        bottom: -10px;
        left: -15px;
        width: 2.5rem;
        aspect-ratio: 1;
        background-color: red;
        border-radius: 50%;
    }
    .Newton-animation div:nth-child(1){
        transform-origin: top left;
        animation: rotation1 3.5s linear infinite ;

    }
    .Newton-animation div:nth-child(5){
        transform-origin: top right;
        animation: rotation2 3.5s linear 1.8s infinite ;

    }
@keyframes rotation1 {
    0%{
         transform: rotate(0);
    }
    25%{
        transform: rotate(30deg);

    }
    50%{
        transform: rotate(0);
    }
    100%{
        transform: rotate(0);
    }
}
@keyframes rotation2 {
    0%{
         transform: rotate(0);
    }
    25%{
        transform: rotate(-30deg);

    }
    50%{
        transform: rotate(0);
    }
    100%{
        transform: rotate(0);
    }
}
    
    
</style>
<body>
        <div class="heading">Pendulum Animation</div>
        <div class="Newton-animation">
            <div></div>
            <div></div>
            <div></div>
            <div></div>
            <div></div>
        </div>
        
    
</body>
</html>
