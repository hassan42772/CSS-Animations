<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Button Shaking Animation</title>
</head>
<style>
    *{
        margin: 0;
        padding: 0;
        box-sizing: border-box;
    }
    body{
        width: 100%;
        height: 100vh;
        display: flex;
        flex-direction: column;
        justify-content: space-between;
        align-items: center;
        background-color: #212121;
    }
    h1{
        color: white;
        font-size: 2rem;
        font-weight: 500;
    }
    button{
        width: 200px;
        height: 8vh;
        border-radius: 10px;
        background-color: white;
    }
    button:hover{
        animation: shaking 1.5s linear infinite alternate;
    }

    @keyframes shaking {
        0%{
            transform: rotate(10deg);
            scale: 1.3;
            background-color: red;
        }
        20%{
            transform: rotate(-10deg);
            scale: 1.2;
            background-color: orange;
        }
        40%{
            transform: rotate(10deg);
            scale: 1.5;
            background-color: purple;
        }
        80%{
            transform: rotate(-10deg);
            scale: 1.2;
            background-color: aqua;
        }
        100%{
            transform: rotate(0deg);
            scale: 1.1;
            background-color: brown;
        }
    }
</style>
<body>
    <h1 >Shaking Button</h1>
    <button class="shaking">Hover To Shake Me!</button>
</body>
</html>
